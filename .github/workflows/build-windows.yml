name: Build Windows EXE Dynamic

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout CraftPacker
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtbase'

      - name: Configure CMake
        shell: cmd
        run: |
          cmake -S . -B build ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_PREFIX_PATH="%Qt6_DIR%\..\.."

      - name: Build
        shell: cmd
        run: |
          cmake --build build --config Release

      - name: Deploy Qt DLLs
        shell: cmd
        run: |
          if not exist dist mkdir dist

          if exist build\Release\CraftPacker.exe copy /Y build\Release\CraftPacker.exe dist\CraftPacker.exe
          if exist build\CraftPacker.exe copy /Y build\CraftPacker.exe dist\CraftPacker.exe

          windeployqt dist\CraftPacker.exe

          dir dist

      - name: Upload portable app
        uses: actions/upload-artifact@v4
        with:
          name: CraftPacker-Windows-Portable
          path: dist/**
